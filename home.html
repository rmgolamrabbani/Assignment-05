<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwindcss and daisyui cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- added fontwasome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- web app title  -->
    <title>GitHub Issues Tracker | login</title>
    <!-- added font family to body  -->
    <style>
        body {
            font-family: 'Geist', sans-serif;
        }
    </style>

   
</head>
<body class=" bg-base-200 ">
    
<header>
        <div class="navbar bg-base-100 shadow-sm px-4 sticky top-5 z-10">
            <div class="flex-1">
              <h2 class="text-xl flex items-center gap-2 font-bold"> <img class="w-[32px]" src="assets/github-logo.png" alt="">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2">
                 <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" id="searchInput" />
                 <div class="dropdown dropdown-end">
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                 </div>
            </div>
        </div>
</header>

<main id="mainContent" class="min-h-screen max-w-7xl  mx-auto ">

    <div id="btnContent" class=" bg-base-100 p-4 mt-4 rounded-box shadow-sm">

    <button id="allBtn" class="toggle-btn bg-blue-700 text-white px-4 py-2 rounded" data-type="all">
      All
    </button>

    <button id="openBtn" class="toggle-btn bg-white border px-4 py-2 rounded" data-type="open">
      Open
    </button>

    <button id="closedBtn" class="toggle-btn bg-white border px-4 py-2 rounded" data-type="closed">
      Closed
    </button>

    </div>


    <div class="bg-base-100 p-4 mt-4 rounded-box shadow-sm justify-between flex ">
        <div class="flex items-center gap-2">
            <div class="bg-base-300 p-2 rounded-full"><img src="assets/Aperture.png" alt=""></div>
            <div class="">
                <h3 id="issueCount" class="font-semibold pr-2">50 <span >Issues</span></h3>
                <p class="text-sm text-base-content/50">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex items-end gap-2 text-sm font-semibold">
          <p class="flex justify-end "> <div class="w-3 h-3 bg-green-600 rounded-full justify-end mb-1"></div>Open</p>
          <p class="flex justify-end "> <div class="w-3 h-3 bg-purple-600 rounded-full justify-end mb-1 " ></div>Closed</p>  
        </div>
    </div>

    <!-- loading spinner -->
      <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">
          <span class="loading loading-dots loading-xl"></span>
      </div>

    <div id="cardsContainer" class="bg-base-100 p-4 mt-4 rounded-box shadow-sm grid gap-4 md:grid-cols-4">
        <!-- Issue cards will be dynamically inserted here -->
    </div>


  <!-- Open the modal using ID.showModal() method -->
<dialog id="issueModal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitle" class="text-lg font-bold"></h3> 
    
    <div class="py-4 space-y-3">
        <p id="modalDescription" class="text-gray-600"></p>
        
        <div id="modalLabels" class="flex flex-wrap gap-2"></div>

        <div class="text-sm bg-base-200 p-3 rounded-lg">
            <p id="modalStatus" class="font-medium"></p>
            <p id="modalPriority"></p>
            <p id="modalAuthor"></p>
            <p id="modalDate" class="italic opacity-70"></p>
        </div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>



</main>



<script src="script/home.js"></script>
</body>
</html>
