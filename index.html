<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwindcss and daisyui cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- web app title  -->
    <title>GitHub Issues Tracker | login</title>
    <!-- added font family to body  -->
    <style>
        body {
            font-family: 'Geist', sans-serif;
        }
    </style>

</head>
<body class="min-h-screen max-w-md bg-base-600 mx-auto flex items-center justify-center border-amber-300">
    
 <fieldset class="fieldset mx-auto bg-base-400 border-base-300 rounded-box w-xs border p-4 ">
  <!-- <legend class="fieldset-legend">Login</legend> -->
    <div class="flex flex-col items-center mb-6  border-blue-300 p-2">
      <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mb-4">
      <h1 class=" text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
      <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
    </div>

  <label class="label">Username</label>
  <input type="text" class="input" placeholder="Enter your username"/>

  <label class="label">Password</label>
  <input  type="password" class="input" placeholder="Enter your password"/>

  <button id="loginBtn" class=" btn btn-primary mt-4 w-full">Sign In</button>

  <div class="flex items-center my-5">
    <div class="flex-grow border-t bg-gray-500"></div>
  <span class="mx-4">OR</span>
    <div class="flex-grow border-t bg-gray-500"></div>
</div>

    <div class="text-center">
      <p class="text-gray-500 text-sm">Don't have an account? <a href="#" class="text-blue-500 hover:underline">Sign up</a></p>
    </div>

</fieldset>
<script src="script/login.js"></script>
</body>
</html>
