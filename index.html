<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwindcss and daisyui cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- web app title  -->
    <title>GitHub Issues Tracker | login</title>
    <!-- added font family to body  -->
    <style>
        body {
            font-family: 'Geist', sans-serif;
        }
    </style>

</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto flex items-center justify-center">
    
 <fieldset class="fieldset mx-auto bg-base-200 border-base-300 rounded-box w-xs border p-4">
  <!-- <legend class="fieldset-legend">Login</legend> -->

  <label class="label">Username</label>
  <input type="text" class="input" placeholder="Enter your username"/>

  <label class="label">Password</label>
  <input  type="password" class="input" placeholder="Enter your password"/>

  <button id="loginBtn" class="btn btn-primary mt-4">Sign In</button>
</fieldset>
<script src="script/login.js"></script>
</body>
</html>
